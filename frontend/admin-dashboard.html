<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script defer src="admin-dashboard.js"></script>

    <link href="./src/output.css" rel="stylesheet" />
  </head>
<body class="bg-linear-to-br from-slate-900 to-slate-800 text-amber-50 hidden">

  <header
    class="bg-amber-100/95 backdrop-blur-md text-slate-950 flex justify-between items-center px-10 py-3 shadow-md border-b border-amber-200"
  >
    <h2 class="font-bold text-xl tracking-wide">Admin Dashboard</h2>
    <h1 class="font-semibold opacity-90 text-lg">Invoice & Billing</h1>

    <button
      onclick="logout()"
      class="px-6 py-2 bg-black text-red-500 font-semibold rounded-lg border border-red-500 hover:text-red-400 hover:border-red-400 hover:shadow-lg transition-all duration-300 relative overflow-hidden after:absolute after:inset-0 after:bg-red-500/20 after:scale-150 after:opacity-0 hover:after:scale-100 hover:after:opacity-100 after:transition after:duration-500 after:ease-out"
    >
      Logout
    </button>
  </header>

  <!-- Search -->
  <input
    type="text"
    placeholder="Search businesses..."
    id="searchElement"
    oninput="searchBusiness()"
    class="absolute right-20 translate-y-3 px-4 py-2 bg-white text-slate-800 rounded-xl shadow-md focus:outline-none focus:ring-2 focus:ring-amber-400 focus:shadow-lg transition-all duration-300"
  />

  <div class="absolute right-10 z-10 translate-y-16">
    <div
      id="searchDiv"
      class="w-[50vw] max-h-[50vh] overflow-y-auto hidden flex-col gap-2 bg-white text-gray-800 rounded-xl shadow-xl py-3 border border-gray-200"
    ></div>
  </div>

  <div class="px-24 pb-12">
    <h2 class="text-2xl mt-6 mb-3 font-semibold tracking-wide">
      Analytics 📊
    </h2>

    <div
      class="flex justify-center flex-wrap gap-6 bg-white/10 backdrop-blur-md p-6 rounded-xl shadow-lg border border-white/10"
    >
      <!-- Card -->
      <div class="bg-linear-to-br from-green-300 to-green-200 text-lg font-semibold rounded-xl shadow-md hover:shadow-lg transition p-1 w-65">
        <h2 class="p-3 text-slate-700 border-b border-green-400/40">
          #1 Business
        </h2>
        <h3 id="topUser" class="p-3 text-slate-900 font-bold"></h3>
      </div>

      <div class="bg-linear-to-br from-green-300 to-green-200 text-lg font-semibold rounded-xl shadow-md hover:shadow-lg transition p-1 w-65">
        <h2 class="p-3 text-slate-700 border-b border-green-400/40">
          Total Invoices (30 days)
        </h2>
        <h3 id="total30" class="p-3 text-slate-900 font-bold"></h3>
      </div>

      <div class="bg-linear-to-br from-green-300 to-green-200 text-lg font-semibold rounded-xl shadow-md hover:shadow-lg transition p-1 w-65">
        <h2 class="p-3 text-slate-700 border-b border-green-400/40">
          Premium Users
        </h2>
        <h3 class="p-3 text-slate-900 font-bold">N/A</h3>
      </div>

      <div class="bg-linear-to-br from-green-300 to-green-200 text-lg font-semibold rounded-xl shadow-md hover:shadow-lg transition p-1 w-65">
        <h2 class="p-3 text-slate-700 border-b border-green-400/40">
          Total Businesses
        </h2>
        <h3 id="totalUsers" class="p-3 text-slate-900 font-bold"></h3>
      </div>

      <div class="bg-linear-to-br from-green-300 to-green-200 text-lg font-semibold rounded-xl shadow-md hover:shadow-lg transition p-1 w-65">
        <h2 class="p-3 text-slate-700 border-b border-green-400/40">
          Banned Businesses
        </h2>
        <h3 id="bannedUsers" class="p-3 text-slate-900 font-bold"></h3>
      </div>

      <div class="bg-linear-to-br from-green-300 to-green-200 text-lg font-semibold rounded-xl shadow-md hover:shadow-lg transition p-1 w-65">
        <h2 class="p-3 text-slate-700 border-b border-green-400/40">
          Rejected Businesses
        </h2>
        <h3 id="rejectedUsers" class="p-3 text-slate-900 font-bold"></h3>
      </div>
    </div>

    <!-- Pending -->
    <h2 class="text-2xl mt-8 mb-3 font-semibold tracking-wide">
      Pending Approvals
    </h2>

   <div
  id="pendingContainer"
  class="flex flex-col items-center gap-3 bg-white/10 backdrop-blur-md p-5 rounded-xl shadow-lg border border-white/10 max-h-[50vh] overflow-y-auto [&>div]:w-full"
></div>

    <!-- Approved -->
    <h2 class="text-2xl mt-8 mb-3 font-semibold tracking-wide">
      Approved Businesses
    </h2>

  <div
  id="approvedContainer"
  class="flex flex-col items-center gap-3 bg-emerald-100/90 p-5 rounded-xl shadow-lg border border-emerald-200 max-h-[50vh] overflow-y-auto [&>div]:w-full"
></div>

    <!-- Rejected -->
    <h2 class="text-2xl mt-8 mb-3 font-semibold tracking-wide">
      Rejected Businesses
    </h2>

    <div
  id="rejectedContainer"
  class="flex flex-col items-center gap-3 bg-red-100/90 p-5 rounded-xl shadow-lg border border-red-200 max-h-[50vh] overflow-y-auto [&>div]:w-full"
></div>

    <!-- Banned -->
    <h2 class="text-2xl mt-8 mb-3 font-semibold tracking-wide">
      Banned Businesses
    </h2>

   <div
  id="bannedContainer"
  class="flex flex-col items-center gap-3 bg-red-200/90 p-5 rounded-xl shadow-lg border border-red-300 max-h-[50vh] overflow-y-auto [&>div]:w-full"
></div>
  </div>
</body>
  
</html>
