<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Edit Business</title>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script defer src="edit-business.js"></script>

    <link href="./src//output.css" rel="stylesheet" />
  </head>

  <body class="">
    <div id="header">
      <div
        class="bg-linear-to-r from-blue-600 to-indigo-600 text-white px-6 py-4 flex justify-between items-center shadow-lg"
      >
        <div>
          <h1 id="businessName" class="text-xl font-bold">
          </h1>
          <p class="text-sm opacity-80">Dashboard</p>
        </div>

  
        <div class="flex items-center gap-3">
          <button
            onclick="window.location.href = '/dashboard.html'"
            class="bg-white text-blue-600 px-4 py-1.5 rounded-md hover:bg-gray-100 transition"
          >
            Dashboard
          </button>


          <button
            onclick="window.location.href = '/dashboard.html'"
            class="bg-yellow-400 text-black px-4 py-1.5 rounded-md hover:bg-yellow-500 transition"
          >
            Cancel
          </button>

          <button
            onclick="logout()"
            class="bg-red-500 px-4 py-1.5 rounded-md hover:bg-red-600 transition"
          >
            Logout
          </button>
        </div>
      </div>
    </div>

    <div class="bg-gray-100 flex items-center justify-center h-screen">
   <div class="bg-white p-6 rounded-xl shadow w-96">
      <h1 class="text-2xl font-bold mb-4 text-center">Edit Business Profile</h1>

      <input
        id="name"
        class="border p-2 w-full mb-3 rounded"
        placeholder="Enter business name"
      />
      <input
        id="address"
        class="border p-2 w-full mb-3 rounded"
        placeholder="Enter address"
      />
      <input
        id="phone"
        class="border p-2 w-full mb-3 rounded"
        placeholder="Enter phone"
      />
      <input
        id="gst"
        class="border p-2 w-full mb-4 rounded"
        placeholder="GST no"
      />

      <button
        onclick="updateBusiness()"
        class="bg-blue-500 text-white w-full py-2 rounded hover:bg-blue-600"
      >
        Save Changes
      </button>
    </div>
    </div>
 
  </body>
</html>
