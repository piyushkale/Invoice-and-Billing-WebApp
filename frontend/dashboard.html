<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script defer src="dashboard.js"></script>

    <link href="./src/output.css" rel="stylesheet" />
  </head>

  <body class="bg-gray-300">
    <!-- Navbar -->
    <div id="header">
      <!-- paste header here -->
      <div
        class="bg-linear-to-r from-blue-600 to-indigo-600 text-white px-6 py-4 flex justify-between items-center shadow-lg"
      >
        <!-- Left side  -->
        <div>
          <h1 id="businessName" class="text-xl font-bold"></h1>
          <p class="text-sm opacity-80">Dashboard</p>
        </div>

        <!-- Right side -->
        <div class="flex items-center gap-3">
          <button
            onclick="window.location.href = '/dashboard.html'"
            class="bg-white cursor-pointer text-blue-600 px-4 py-1.5 rounded-md hover:bg-gray-100 transition"
          >
            Dashboard
          </button>

          <button
            onclick="window.location.href = '/edit-business.html'"
            class="bg-yellow-400 cursor-pointer text-black px-4 py-1.5 rounded-md hover:bg-yellow-500 transition"
          >
            Edit Profile
          </button>

          <button
            onclick="logout()"
            class="bg-red-500 px-4 py-1.5 rounded-md hover:bg-red-600 cursor-pointer transition"
          >
            Logout
          </button>
        </div>
      </div>
    </div>

    <div class="p-6 max-w-5xl mx-auto">
      <!-- Business Profile -->
      <div
        class="bg-indigo-200 text-slate-700 brightness-110 p-5 rounded-md shadow mb-6"
      >
        <h2 class="text-xl font-semibold mb-3">Business Profile</h2>

        <p class="my-2">
          <span
            id="bizName"
            class="text-3xl font-sans text-slate-900/90 font-bold"
          ></span>
        </p>
        <p><strong>Address </strong> <span id="bizAddress"></span></p>
        <p><strong>Phone </strong> <span id="bizPhone"></span></p>
        <p><strong>GST </strong> <span id="bizGST"></span></p>
      </div>
      <h2 class="text-2xl mt-5 mb-2 font-sans text-slate-800/90 font-semibold">
        Analytics 📊
      </h2>

      <div
        class="flex justify-center flex-wrap shadow rounded-sm gap-4 opacity-95 [&_div]:w-1/4 bg-indigo-100/90 p-4"
      >
        <div class="bg-green-300 text-xl font-bold rounded-md">
          <h2 class="p-3 text-slate-800/80 shadow-2xl shadow-emerald-950">
            Last 30 days Earning
          </h2>
          <h3 id="last30Id" class="p-3 bg-green-200"></h3>
        </div>
        <div class="bg-green-300 text-xl font-bold rounded-md">
          <h2 class="p-3 text-slate-800/80 shadow-2xl shadow-emerald-950">
            Total bills (30 days)
          </h2>
          <h3 id="billsId" class="p-3 bg-green-200"></h3>
        </div>
        <div class="bg-green-300 text-xl font-bold rounded-md">
          <h2 class="p-3 text-slate-800/80 shadow-2xl shadow-emerald-950">
            Last year Earning
          </h2>
          <h3 id="lastYearId" class="p-3 bg-green-200"></h3>
        </div>
      </div>

      <!-- Create invoice -->
      <div class="bg-white p-5 rounded-xl shadow max-w-2xl mx-auto mt-6">
        <h2 class="text-xl font-bold mb-4">Create Invoice</h2>

        <!-- Customer -->
        <input
          id="customerName"
          type="text"
          placeholder="Customer Name"
          class="border p-2 w-full rounded mb-4"
        />

        <!-- Items -->
        <div id="itemsContainer" class="space-y-2 mb-4"></div>

        <button
          onclick="addItem()"
          class="bg-blue-500 cursor-pointer text-white px-3 py-1 rounded mb-4"
        >
          + Add Item
        </button>

        <!-- Total -->
        <h3 class="font-bold mb-4">Total: ₹<span id="total">0</span></h3>

        <!-- Submit -->
        <button
          onclick="createInvoice()"
          class="bg-green-500 cursor-pointer text-white px-4 py-2 rounded hover:bg-green-600"
        >
          Create Invoice
        </button>
      </div>

      <div class="flex justify-between items-center mt-7 mb-4">
        <h2 class="text-xl font-semibold">Invoices</h2>
        <div>
          <input
            type="text"
            placeholder="Find Invoice"
            name="searchInvoice"
            id="searchInv"
            oninput="handleSearchInvoice()"
            class="w-full px-4 bg-indigo-100 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-200"
          />
        </div>
      </div>
      <!-- Invoice Table -->
      <div class="bg-white p-4 rounded-xl shadow h-[70vh] overflow-y-auto">
        <table class="w-full text-left">
          <thead>
            <tr class="border-b text-gray-600">
              <th class="py-2">Client Name</th>
              <th>Amount</th>
              <th>Date</th>
              <th>Actions</th>
            </tr>
          </thead>

          <tbody id="invoiceTable" class="text-gray-700"></tbody>
        </table>
      </div>
    </div>
  </body>
</html>
