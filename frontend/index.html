<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Auth</title>
    <link href="./src/output.css" rel="stylesheet" />
  </head>

  <body class="bg-gray-700 flex flex-col items-center justify-center h-screen">
    <h2 class="text-4xl text-amber-100 mb-10 opacity-90 font-bold">Invoice & Billing</h2>
    <div class="bg-slate-200 p-8 rounded-2xl shadow-md w-96">
      <h2 id="title" class="text-2xl font-bold mb-6 text-center">Login</h2>

      <form id="authForm" class="space-y-4">
        <!-- Name (only for signup) -->
        <input
          type="text"
          id="name"
          placeholder="Name"
          class="w-full p-2 border rounded-lg hidden"
        />

        <input
          type="email"
          id="email"
          placeholder="Email"
          class="w-full p-2 border rounded-lg"
          required
        />

        <input
          type="password"
          id="password"
          placeholder="Password"
          class="w-full p-2 border rounded-lg"
          required
        />

        <button
          type="submit"
          class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600"
        >
          Submit
        </button>

        <p class="text-center text-sm">
          <span id="toggleText">Don't have an account?</span>
          <button type="button" id="toggleBtn" class="text-blue-500">
            Signup
          </button>
        </p>
      </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="./auth.js"></script>
  </body>
</html>
