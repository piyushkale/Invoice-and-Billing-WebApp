<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Create Business</title>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script defer src="create-business.js"></script>
  <link href="./src/output.css" rel="stylesheet">
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

  <div class="bg-white p-6 rounded shadow w-96">
    <h1 class="text-2xl font-bold mb-4 text-center">Create Business Profile</h1>

    <input id="name" type="text" placeholder="Business Name"
      class="border p-2 w-full mb-3 rounded" />

    <input id="address" type="text" placeholder="Address"
      class="border p-2 w-full mb-3 rounded" />

    <input id="phone" type="text" placeholder="Phone"
      class="border p-2 w-full mb-3 rounded" />

    <input id="gst" type="text" placeholder="GST (optional)"
      class="border p-2 w-full mb-4 rounded" />

    <button onclick="createBusiness()"
      class="bg-blue-500 text-white w-full py-2 rounded">
      Save & Continue
    </button>
  </div>

</body>
</html>
